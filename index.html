<html>
  <head>
      <title>
          Auto index of repository
      </title>
  </head>
  <body>
    <h2>
        Hi sweetie. This is index of contents. select them:
    </h2>
    <br />
    <script>
      (async () => {
        const response = await fetch('https://api.github.com/repos/ali-shokoohi/ali-shokoohi.github.io/contents/storage/');
        const data = await response.json();
        let htmlString = '<ul>';
        for (let file of data) {
          htmlString += `<li><a href="${file.path}">${file.name}</a></li>`;
        }
        htmlString += '</ul>';
        document.getElementsByTagName('body')[0].innerHTML = htmlString;
      })()
    </script>
  <body>
</html>
